name: Deploy

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ["cw1997-pi4"]
    steps:
      - name: Check hostname and deploy
        run: |
          if [ "$(hostname)" != "cw1997-pi4" ]; then
            echo "Not on cw1997-pi4, skipping deployment"
            exit 0
          fi

      # - name: Log in to Docker Hub
      #   run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # - name: Pull Docker image
      #   run: |
      #     docker pull ${{ secrets.DOCKER_USERNAME }}/changwei-homepage:latest

      - name: Stop and remove Docker container
        run: |
          docker stop changwei-homepage || true
          docker rm changwei-homepage || true

      - name: Run Docker container
        run: |
          docker run -d --name changwei-homepage -p 3000:3000 --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/changwei-homepage:latest

