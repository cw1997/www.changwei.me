name: Docker Build and Push

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ["cw1997-pi4"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: sudo docker build -t ${{ secrets.DOCKER_USERNAME }}/changwei-homepage:latest .

      - name: Push Docker image
        run: sudo docker push ${{ secrets.DOCKER_USERNAME }}/changwei-homepage:latest
