name: Test

on:
  push:
    branches:
      - main

jobs:
  discover-locales:
    runs-on: ubuntu-latest
    outputs:
      locales: ${{ steps.set.outputs.locales }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: set
        name: Discover locales from src/messages
        run: |
          shopt -s nullglob
          files=(src/messages/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No locale JSON files under src/messages"
            exit 1
          fi
          locales="["
          first=true
          for f in "${files[@]}"; do
            if [ "$first" = true ]; then first=false; else locales+=","; fi
            base=$(basename "$f" .json)
            locales+="\"$base\""
          done
          locales+="]"
          echo "locales=$locales" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # node-version: '25'
          # cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  i18n-check:
    needs: discover-locales
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.discover-locales.outputs.locales) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Run Lingual i18n check (${{ matrix.source }})
        run: pnpx @lingual/i18n-check@latest --source ${{ matrix.source }} --locales ./src/messages
