name: Test

on:
  push:
    branches:
      - main

jobs:
  discover-locales:
    runs-on: ["ubuntu-latest"]
    outputs:
      locales: ${{ steps.set.outputs.locales }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: set
        name: Discover locales from src/messages
        run: |
          shopt -s nullglob
          files=(src/messages/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No locale JSON files under src/messages"
            exit 1
          fi
          locales="["
          first=true
          for f in "${files[@]}"; do
            if [ "$first" = true ]; then first=false; else locales+=","; fi
            base=$(basename "$f" .json)
            locales+="\"$base\""
          done
          locales+="]"
          echo "locales=$locales" >> "$GITHUB_OUTPUT"

  lint-test:
    runs-on: ["ubuntu-latest"]
    strategy:
      fail-fast: false
      matrix:
        task: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          # node-version: '25'
          # cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

  i18n-check:
    needs: discover-locales
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.discover-locales.outputs.locales) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Run Lingual i18n check (${{ matrix.source }})
        run: pnpx @lingual/i18n-check@latest --source ${{ matrix.source }} --locales ./src/messages
