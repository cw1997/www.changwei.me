name: Test

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # node-version: '25'
          # cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Run Lingual i18n check (en-US)
        run: pnpx @lingual/i18n-check@latest --source en-US --locales ./src/messages

      - name: Run Lingual i18n check (zh-Hans)
        run: pnpx @lingual/i18n-check@latest --source zh-Hans --locales ./src/messages

      - name: Run Lingual i18n check (zh-Hant)
        run: pnpx @lingual/i18n-check@latest --source zh-Hant --locales ./src/messages