name: Test

on:
  push:
    branches:
      - main

jobs:
  discover-locales:
    runs-on: ubuntu-latest
    outputs:
      locales: ${{ steps.set.outputs.locales }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: set
        name: Discover locales from src/messages
        run: |
          shopt -s nullglob
          files=(src/messages/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No locale JSON files under src/messages"
            exit 1
          fi
          locales="["
          first=true
          for f in "${files[@]}"; do
            if [ "$first" = true ]; then first=false; else locales+=","; fi
            base=$(basename "$f" .json)
            locales+="\"$base\""
          done
          locales+="]"
          echo "locales=$locales" >> "$GITHUB_OUTPUT"

  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          # node-version: '25'
          # cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

  i18n-check:
    needs: discover-locales
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.discover-locales.outputs.locales) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Run Lingual i18n check (${{ matrix.source }})
        run: pnpx @lingual/i18n-check@latest --source ${{ matrix.source }} --locales ./src/messages
